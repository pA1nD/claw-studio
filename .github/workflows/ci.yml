name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test

  get-context:
    name: "Build Milestone Context"
    needs: [lint, typecheck]
    runs-on: self-hosted
    outputs:
      milestone_context: ${{ steps.context.outputs.milestone_context }}
    steps:
      - name: Build milestone context
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Get PR body and extract linked issue number (Closes #N / Fixes #N / Resolves #N)
          PR_BODY=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body -q .body)
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oiE '(closes|fixes|resolves)\s+#[0-9]+' | head -1 | grep -oE '[0-9]+' || true)

          if [ -z "$ISSUE_NUM" ]; then
            {
              echo "milestone_context<<CTXDELIM"
              echo "## Milestone Context"
              echo ""
              echo "WARNING: No linked issue found in PR body."
              echo "Every PR must contain 'Closes #N' to link to its implementation issue."
              echo "Without this, reviewers lack milestone context and may flag intentionally deferred work as missing."
              echo "CTXDELIM"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find the milestone label (v0.1, v0.2, etc.) on the linked issue
          MILESTONE=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json labels \
            -q '[.labels[].name | select(startswith("v"))][0] // empty' || true)

          if [ -z "$MILESTONE" ]; then
            CURRENT_TITLE=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json title -q .title)
            {
              echo "milestone_context<<CTXDELIM"
              echo "## Milestone Context"
              echo ""
              echo "This PR implements issue #${ISSUE_NUM} (${CURRENT_TITLE})."
              echo "No milestone label (v*) found on the issue — cannot build full milestone progress tree."
              echo "CTXDELIM"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch the current issue title
          CURRENT_TITLE=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json title -q .title)

          # Fetch all issues in this milestone (open + closed), sorted ascending by number
          ISSUES_JSON=$(gh issue list --repo "$REPO" --label "$MILESTONE" --state all \
            --json number,title,body,state --limit 100 | jq 'sort_by(.number)')

          # Build progress tree: each issue gets a status indicator and a one-line scope summary
          PROGRESS=$(echo "$ISSUES_JSON" | jq -r --arg cur "$ISSUE_NUM" '.[] |
            # Extract first meaningful line from body as scope summary
            ((.body // "") | split("\n") | map(select(
              length > 0 and
              (startswith("#") | not) and
              (startswith("```") | not) and
              (startswith("- ") | not) and
              (startswith("| ") | not) and
              (startswith("  ") | not)
            )) | .[0] // "No description" | .[0:150]) as $scope |
            if .number == ($cur | tonumber) then
              "-> #\(.number) — \(.title) <-- THIS PR\n   \($scope)"
            elif .state == "CLOSED" then
              "[x] #\(.number) — \(.title) [DONE]\n   \($scope)"
            else
              "[ ] #\(.number) — \(.title) [PENDING]\n   \($scope)"
            end
          ')

          # Count done / total for a quick summary line
          DONE_COUNT=$(echo "$ISSUES_JSON" | jq '[.[] | select(.state == "CLOSED")] | length')
          TOTAL_COUNT=$(echo "$ISSUES_JSON" | jq 'length')

          # Write the full context block to job output
          {
            echo "milestone_context<<CTXDELIM"
            echo "## Milestone Context: ${MILESTONE}"
            echo ""
            echo "This PR implements issue #${ISSUE_NUM} (${CURRENT_TITLE})."
            echo "Milestone progress: ${DONE_COUNT}/${TOTAL_COUNT} issues completed."
            echo ""
            echo "### Milestone Progress"
            echo "${PROGRESS}"
            echo ""
            echo "### Reviewer Instructions"
            echo "- [DONE] = already merged and working. You can assume this functionality exists."
            echo "- THIS PR = the scope of this PR. Review ONLY against this issue's requirements."
            echo "- [PENDING] = intentionally deferred to a future PR. Do NOT flag missing functionality from pending issues."
            echo "- Stubs, TODOs, or incomplete code paths for [PENDING] issues are expected and correct."
            echo "CTXDELIM"
          } >> "$GITHUB_OUTPUT"

  arch:
    name: "Arch Review"
    needs: [get-context]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ${{ needs.get-context.outputs.milestone_context }}

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are Arch, a code architecture reviewer for Claw Studio — a TypeScript CLI loop.
            Review for: separation of concerns, module structure per CLAUDE.md, composability,
            alignment with the src/ layout. Do not flag [PENDING] issues as missing.
            Post your review as a PR comment starting with ## Arch Review.
            End with APPROVED or CHANGES REQUESTED and one sentence why.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  dx:
    name: "DX Review"
    needs: [get-context]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ${{ needs.get-context.outputs.milestone_context }}

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are DX, a developer experience reviewer for Claw Studio — a TypeScript CLI loop.
            Review for: TypeScript strictness, no `any`, error message quality per CLAUDE.md,
            JSDoc on public functions, no @ts-ignore or eslint-disable.
            Post your review as a PR comment starting with ## DX Review.
            End with APPROVED or CHANGES REQUESTED and one sentence why.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  security:
    name: "Security Review"
    needs: [get-context]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ${{ needs.get-context.outputs.milestone_context }}

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are Security, a security reviewer for Claw Studio — a CLI that handles GitHub PATs and Claude OAuth tokens.
            Treat any credential exposure in logs or error messages as BLOCKING.
            Review for: token leakage, input validation, safe secret handling, dependency safety.
            Post your review as a PR comment starting with ## Security Review.
            Mark any credential leak BLOCKING.
            End with APPROVED or CHANGES REQUESTED and one sentence why.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  perf:
    name: "Perf Review"
    needs: [get-context]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ${{ needs.get-context.outputs.milestone_context }}

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are Perf, a performance reviewer for Claw Studio — a loop that polls GitHub continuously.
            Review for: unnecessary GitHub API calls, missing pagination, blocking async operations,
            memory leaks in the loop, missing rate limit handling.
            Post your review as a PR comment starting with ## Perf Review.
            End with APPROVED or CHANGES REQUESTED and one sentence why.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  test:
    name: "Test Review"
    needs: [get-context]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            ${{ needs.get-context.outputs.milestone_context }}

            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are Test, a test quality reviewer for Claw Studio.
            Review for: missing test files for new modules, untested error paths,
            tests that test implementation not behaviour, missing edge cases for state checks.
            Post your review as a PR comment starting with ## Test Review.
            End with APPROVED or CHANGES REQUESTED and one sentence why.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  summary:
    name: "Review Summary"
    runs-on: self-hosted
    needs: [arch, dx, security, perf, test]
    if: >-
      ${{
        needs.arch.result == 'success' || needs.arch.result == 'failure' ||
        needs.dx.result == 'success' || needs.dx.result == 'failure' ||
        needs.security.result == 'success' || needs.security.result == 'failure' ||
        needs.perf.result == 'success' || needs.perf.result == 'failure' ||
        needs.test.result == 'success' || needs.test.result == 'failure'
      }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are the Review Coordinator for Claw Studio.
            Read all agent review comments on this PR, then post a summary comment with:
            ## Review Summary
            | Agent | Verdict | Blocking? |
            |-------|---------|-----------|
            | Arch | ... | ... |
            | DX | ... | ... |
            | Security | ... | ... |
            | Perf | ... | ... |
            | Test | ... | ... |

            Then: X/5 agents approved.
            Either ### Ready to merge or ### Blocking Issues (list them).
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr view:*)"
